services:
  # ----------------------------------------------------
  # 1. FastAPI Backend Web Service
  # ----------------------------------------------------
  - type: web
    name: jyotishai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: BACKEND_AGENT_SECRET
        sync: false

  # ----------------------------------------------------
  # 2. Next.js Frontend Web Service
  # ----------------------------------------------------
  - type: web
    name: jyotishai-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_LIVEKIT_URL
        sync: false
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false # Set this to the public URL of the deployed backend (e.g. https://jyotishai-backend.onrender.com)

  # ----------------------------------------------------
  # 3. LiveKit Python Voice Agent (Background Worker)
  # ----------------------------------------------------
  - type: worker
    name: jyotishai-agent
    runtime: python
    rootDir: agent
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
